<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객 문의 기록 관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #4F6EF7;
      --primary-dark: #3A57D9;
      --c-접수:   #4F6EF7;
      --c-확인:   #8B5CF6;
      --c-처리중: #F59E0B;
      --c-완료:   #22C55E;
      --gray-50:  #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-600: #4B5563;
      --gray-800: #1F2937;
      --radius: 10px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,.18);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .logo { font-size: 1rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: .5rem; }
    .logo-sub { color: var(--gray-400); font-weight: 400; font-size: .8rem; }

    /* ── Buttons ── */
    .btn {
      padding: .5rem 1.1rem;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-ghost    { background: #fff; color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-ghost:hover { background: var(--gray-100); }
    .btn-danger   { background: #FEE2E2; color: #B91C1C; border: none; }
    .btn-danger:hover { background: #FECACA; }
    .btn-sm { padding: .35rem .85rem; font-size: .8rem; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: .7rem;
      margin-bottom: 1.1rem;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: .85rem 1rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .stat-card:hover       { border-color: var(--primary); }
    .stat-card.active      { border-color: var(--primary); background: #EEF2FF; }
    .stat-card .s-label    { font-size: .72rem; color: var(--gray-400); margin-bottom: .25rem; }
    .stat-card .s-count    { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .stat-card.s-all   .s-count { color: var(--gray-800); }
    .stat-card.s-접수  .s-count { color: var(--c-접수); }
    .stat-card.s-확인  .s-count { color: var(--c-확인); }
    .stat-card.s-처리중 .s-count { color: var(--c-처리중); }
    .stat-card.s-완료  .s-count { color: var(--c-완료); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1rem;
    }
    .search-wrap { flex: 1; min-width: 180px; position: relative; }
    .search-wrap svg {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--gray-400);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: .5rem 1rem .5rem 2.3rem;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: .875rem;
      background: #fff;
      outline: none;
      font-family: inherit;
    }
    .search-wrap input:focus { border-color: var(--primary); }
    select {
      padding: .5rem .85rem;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: .85rem;
      background: #fff;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      color: var(--gray-800);
    }
    select:focus { border-color: var(--primary); }

    /* ── Table ── */
    .table-wrap {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: .7rem 1rem;
      text-align: left;
      font-size: .72rem;
      font-weight: 600;
      color: var(--gray-400);
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    tbody tr {
      border-bottom: 1px solid var(--gray-100);
      transition: background .1s;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #F5F7FF; }
    td { padding: .8rem 1rem; font-size: .875rem; vertical-align: middle; }
    .td-date    { color: var(--gray-600); white-space: nowrap; font-size: .8rem; }
    .td-company { font-weight: 600; }
    .td-person  { color: var(--gray-600); }
    .td-content {
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--gray-600);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: .2rem .65rem;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-접수   { background: #EEF2FF; color: var(--c-접수); }
    .badge-확인   { background: #F5F3FF; color: var(--c-확인); }
    .badge-처리중 { background: #FEF3C7; color: #92400E; }
    .badge-완료   { background: #DCFCE7; color: #15803D; }
    .badge-cat    { background: var(--gray-100); color: var(--gray-600); }

    .status-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
    }
    .status-btn:hover .badge { filter: brightness(.9); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 4rem 1rem; color: var(--gray-400); }
    .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty p { font-size: .9rem; line-height: 1.8; }

    /* ── Modal backdrop ── */
    .modal-bd {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-bd.open { display: flex; }

    /* ── Modal ── */
    .modal {
      background: #fff;
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp .18s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(14px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-hd {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }
    .modal-hd h2 { font-size: .95rem; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.15rem;
      cursor: pointer;
      color: var(--gray-400);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .modal-close:hover { background: var(--gray-100); color: var(--gray-800); }
    .modal-body { padding: 1.5rem; }
    .modal-ft {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--gray-200);
      display: flex;
      gap: .5rem;
      align-items: center;
    }
    .spacer { flex: 1; }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
    .fg { display: flex; flex-direction: column; gap: .3rem; }
    .fg.full { grid-column: 1 / -1; }
    label { font-size: .78rem; font-weight: 600; color: var(--gray-600); }
    .req { color: var(--primary); }
    input[type="text"],
    input[type="date"],
    textarea,
    .fg select {
      padding: .55rem .85rem;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: .875rem;
      font-family: inherit;
      outline: none;
      transition: border .15s;
      background: #fff;
      width: 100%;
      color: var(--gray-800);
    }
    input:focus, textarea:focus, .fg select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,110,247,.1);
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    /* ── Detail ── */
    .detail-grid { display: flex; flex-direction: column; gap: .7rem; }
    .detail-row  { display: flex; gap: .75rem; font-size: .875rem; }
    .dk { width: 72px; flex-shrink: 0; color: var(--gray-400); font-size: .78rem; padding-top: .1rem; }
    .dv { color: var(--gray-800); line-height: 1.65; word-break: break-word; }
    .detail-div { border: none; border-top: 1px solid var(--gray-100); margin: .25rem 0; }

    /* ── Mobile ── */
    @media (max-width: 720px) {
      .stats { grid-template-columns: repeat(3, 1fr); }

      /* table → card */
      .table-wrap { background: transparent; border: none; border-radius: 0; overflow: visible; }
      table, thead, tbody, th, tr { display: block; }
      thead tr { display: none; }
      td { display: flex; gap: .5rem; padding: .25rem 0; font-size: .875rem; align-items: baseline; }
      td::before {
        content: attr(data-label);
        font-size: .72rem;
        color: var(--gray-400);
        font-weight: 600;
        width: 52px;
        flex-shrink: 0;
        padding-top: .1rem;
      }
      tbody tr {
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        margin-bottom: .65rem;
        padding: .9rem 1rem;
        cursor: pointer;
        transition: background .1s;
        border-bottom: 1px solid var(--gray-200) !important;
      }
      tbody tr:hover { background: #F5F7FF; }
      .td-content { white-space: normal; max-width: 100%; overflow: visible; text-overflow: clip; }

      .modal { border-radius: 14px 14px 0 0; max-height: 95vh; }
      .modal-bd { align-items: flex-end; padding: 0; }
      .form-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      .container { padding: 1rem; }
      header { padding: 0 1rem; }
      .logo-sub { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    📋 문의관리
    <span class="logo-sub">고객 문의 기록</span>
  </div>
  <button class="btn btn-primary" onclick="openAdd()">+ 새 문의</button>
</header>

<div class="container">
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
      </svg>
      <input type="text" id="q" placeholder="고객사명, 담당자, 내용으로 검색… (Ctrl+K)" oninput="render()">
    </div>
    <select id="fStat" onchange="render()">
      <option value="">전체 상태</option>
      <option value="접수">접수</option>
      <option value="확인">확인</option>
      <option value="처리중">처리중</option>
      <option value="완료">완료</option>
    </select>
    <select id="fCat" onchange="render()">
      <option value="">전체 유형</option>
      <option value="기술지원">기술지원</option>
      <option value="계약·결제">계약·결제</option>
      <option value="기능 요청">기능 요청</option>
      <option value="기타">기타</option>
    </select>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
  </div>

  <div class="table-wrap" id="tableWrap">
    <table id="tbl">
      <thead>
        <tr>
          <th>접수일</th>
          <th>고객사</th>
          <th>담당자</th>
          <th>유형</th>
          <th>문의 내용</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyEl" style="display:none">
      <div class="empty-icon">📋</div>
      <p>문의 기록이 없습니다.<br>위의 <strong>새 문의</strong> 버튼으로 추가해 보세요.</p>
    </div>
  </div>
</div>

<!-- ── 추가/수정 모달 ── -->
<div class="modal-bd" id="formModal">
  <div class="modal">
    <div class="modal-hd">
      <h2 id="formTitle">새 문의 추가</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="fg">
          <label>접수일 <span class="req">*</span></label>
          <input type="date" id="f_date">
        </div>
        <div class="fg">
          <label>문의 유형</label>
          <select id="f_cat">
            <option value="기술지원">기술지원</option>
            <option value="계약·결제">계약·결제</option>
            <option value="기능 요청">기능 요청</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="fg">
          <label>고객사명 <span class="req">*</span></label>
          <input type="text" id="f_company" placeholder="(주)예시컴퍼니">
        </div>
        <div class="fg">
          <label>담당자명</label>
          <input type="text" id="f_person" placeholder="홍길동">
        </div>
        <div class="fg full">
          <label>연락처</label>
          <input type="text" id="f_contact" placeholder="010-0000-0000 또는 email@example.com">
        </div>
        <div class="fg full">
          <label>문의 내용 <span class="req">*</span></label>
          <textarea id="f_content" placeholder="고객의 문의 내용을 입력하세요…"></textarea>
        </div>
        <div class="fg">
          <label>상태</label>
          <select id="f_status">
            <option value="접수">접수</option>
            <option value="확인">확인</option>
            <option value="처리중">처리중</option>
            <option value="완료">완료</option>
          </select>
        </div>
        <div class="fg full">
          <label>처리 메모</label>
          <textarea id="f_memo" placeholder="처리 내용, 담당자 메모 등…" style="min-height:60px"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('formModal')">취소</button>
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="saveRecord()">저장</button>
    </div>
  </div>
</div>

<!-- ── 상세 보기 모달 ── -->
<div class="modal-bd" id="detailModal">
  <div class="modal">
    <div class="modal-hd">
      <h2>문의 상세</h2>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-ft">
      <button class="btn btn-danger btn-sm" onclick="deleteRecord()">삭제</button>
      <div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('detailModal')">닫기</button>
      <button class="btn btn-primary btn-sm" onclick="editFromDetail()">수정</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'cust_inquiries_v1';
const STATUSES    = ['접수', '확인', '처리중', '완료'];

let records = [];
let editId  = null;
let viewId  = null;

// ── Storage ──
function load() {
  try { records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { records = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

// ── Render ──
function render() {
  const q    = document.getElementById('q').value.toLowerCase();
  const fSt  = document.getElementById('fStat').value;
  const fCat = document.getElementById('fCat').value;

  const list = records
    .filter(r => {
      if (fSt  && r.status   !== fSt)  return false;
      if (fCat && r.category !== fCat) return false;
      if (q) {
        const hay = [r.company, r.person, r.contact, r.content, r.memo].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    })
    .sort((a, b) => b.createdAt - a.createdAt);

  const tbody  = document.getElementById('tbody');
  const emptyEl = document.getElementById('emptyEl');
  const tbl    = document.getElementById('tbl');

  tbody.innerHTML = '';

  if (list.length === 0) {
    tbl.style.display    = 'none';
    emptyEl.style.display = 'block';
  } else {
    tbl.style.display    = '';
    emptyEl.style.display = 'none';

    list.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-date"    data-label="접수일">${fmtDate(r.date)}</td>
        <td class="td-company" data-label="고객사">${esc(r.company)}</td>
        <td class="td-person"  data-label="담당자">${esc(r.person || '—')}</td>
        <td                    data-label="유형"><span class="badge badge-cat">${esc(r.category)}</span></td>
        <td class="td-content" data-label="내용">${esc(r.content)}</td>
        <td                    data-label="상태">
          <button class="status-btn" onclick="cycleStatus('${r.id}', event)" title="클릭해서 다음 단계로 이동">
            <span class="badge badge-${r.status}">${r.status}</span>
          </button>
        </td>`;
      tr.addEventListener('click', () => openDetail(r.id));
      tbody.appendChild(tr);
    });
  }
  renderStats();
}

function renderStats() {
  const cur = document.getElementById('fStat').value;
  const cnt = { '': records.length };
  STATUSES.forEach(s => cnt[s] = records.filter(r => r.status === s).length);

  const items = [
    { label: '전체',  val: '',    cls: 's-all'   },
    { label: '접수',  val: '접수',  cls: 's-접수'  },
    { label: '확인',  val: '확인',  cls: 's-확인'  },
    { label: '처리중', val: '처리중', cls: 's-처리중' },
    { label: '완료',  val: '완료',  cls: 's-완료'  },
  ];

  document.getElementById('stats').innerHTML = items.map(({ label, val, cls }) => `
    <div class="stat-card ${cls}${cur === val ? ' active' : ''}"
         onclick="setFilter('${val}')">
      <div class="s-label">${label}</div>
      <div class="s-count">${cnt[val] ?? 0}</div>
    </div>`).join('');
}

function setFilter(val) {
  document.getElementById('fStat').value = val;
  render();
}

// ── Add ──
function openAdd() {
  editId = null;
  document.getElementById('formTitle').textContent = '새 문의 추가';
  fillForm({ date: today(), category: '기타', company: '', person: '', contact: '', content: '', status: '접수', memo: '' });
  openModal('formModal');
  setTimeout(() => document.getElementById('f_company').focus(), 120);
}

// ── Save ──
function saveRecord() {
  const company = document.getElementById('f_company').value.trim();
  const content = document.getElementById('f_content').value.trim();
  const date    = document.getElementById('f_date').value;

  if (!company) { alert('고객사명을 입력하세요.'); document.getElementById('f_company').focus(); return; }
  if (!content) { alert('문의 내용을 입력하세요.'); document.getElementById('f_content').focus(); return; }
  if (!date)    { alert('접수일을 입력하세요.'); return; }

  const now  = Date.now();
  const data = {
    date, company,
    person:   document.getElementById('f_person').value.trim(),
    contact:  document.getElementById('f_contact').value.trim(),
    category: document.getElementById('f_cat').value,
    content,
    status:   document.getElementById('f_status').value,
    memo:     document.getElementById('f_memo').value.trim(),
  };

  if (editId) {
    const idx = records.findIndex(r => r.id === editId);
    if (idx >= 0) records[idx] = { ...records[idx], ...data, updatedAt: now };
  } else {
    records.push({ id: uid(), createdAt: now, updatedAt: now, ...data });
  }
  save();
  closeModal('formModal');
  render();
}

// ── Detail ──
function openDetail(id) {
  const r = records.find(r => r.id === id);
  if (!r) return;
  viewId = id;

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-row"><span class="dk">접수일</span><span class="dv">${fmtDate(r.date)}</span></div>
      <div class="detail-row"><span class="dk">고객사</span><span class="dv">${esc(r.company)}</span></div>
      <div class="detail-row"><span class="dk">담당자</span><span class="dv">${esc(r.person || '—')}</span></div>
      <div class="detail-row"><span class="dk">연락처</span><span class="dv">${esc(r.contact || '—')}</span></div>
      <div class="detail-row"><span class="dk">유형</span><span class="dv"><span class="badge badge-cat">${esc(r.category)}</span></span></div>
      <div class="detail-row"><span class="dk">상태</span><span class="dv"><span class="badge badge-${r.status}">${r.status}</span></span></div>
      <hr class="detail-div">
      <div class="detail-row"><span class="dk">내용</span><span class="dv">${nl2br(esc(r.content))}</span></div>
      ${r.memo ? `<div class="detail-row"><span class="dk">처리 메모</span><span class="dv">${nl2br(esc(r.memo))}</span></div>` : ''}
      <hr class="detail-div">
      <div class="detail-row"><span class="dk">등록</span><span class="dv">${fmtTs(r.createdAt)}</span></div>
      <div class="detail-row"><span class="dk">수정</span><span class="dv">${fmtTs(r.updatedAt)}</span></div>
    </div>`;
  openModal('detailModal');
}

function editFromDetail() {
  const r = records.find(r => r.id === viewId);
  if (!r) return;
  closeModal('detailModal');
  editId = r.id;
  document.getElementById('formTitle').textContent = '문의 수정';
  fillForm(r);
  openModal('formModal');
}

function deleteRecord() {
  if (!confirm('이 문의를 삭제할까요? 되돌릴 수 없습니다.')) return;
  records = records.filter(r => r.id !== viewId);
  save();
  closeModal('detailModal');
  render();
}

// ── Status quick cycle (list에서 배지 클릭) ──
function cycleStatus(id, e) {
  e.stopPropagation();
  const r = records.find(r => r.id === id);
  if (!r) return;
  r.status    = STATUSES[(STATUSES.indexOf(r.status) + 1) % STATUSES.length];
  r.updatedAt = Date.now();
  save();
  render();
}

// ── CSV 내보내기 ──
function exportCSV() {
  if (records.length === 0) { alert('내보낼 데이터가 없습니다.'); return; }
  const headers = ['접수일', '고객사명', '담당자명', '연락처', '문의유형', '문의내용', '상태', '처리메모', '등록일시'];
  const rows = records
    .sort((a, b) => b.createdAt - a.createdAt)
    .map(r => [
      r.date, r.company, r.person || '', r.contact || '',
      r.category, r.content, r.status, r.memo || '', fmtTs(r.createdAt),
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
  const csv = '﻿' + [headers.join(','), ...rows].join('\r\n');
  const a   = document.createElement('a');
  a.href    = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `고객문의_${today()}.csv`;
  a.click();
}

// ── Modal ──
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-bd').forEach(bd =>
  bd.addEventListener('click', e => { if (e.target === bd) closeModal(bd.id); })
);

// ── Form fill ──
function fillForm(r) {
  document.getElementById('f_date').value    = r.date     || today();
  document.getElementById('f_company').value = r.company  || '';
  document.getElementById('f_person').value  = r.person   || '';
  document.getElementById('f_contact').value = r.contact  || '';
  document.getElementById('f_cat').value     = r.category || '기타';
  document.getElementById('f_content').value = r.content  || '';
  document.getElementById('f_status').value  = r.status   || '접수';
  document.getElementById('f_memo').value    = r.memo     || '';
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ['detailModal', 'formModal'].forEach(closeModal);
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('q').focus();
  }
});

// ── Utils ──
function uid()     { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today()   { return new Date().toISOString().slice(0, 10); }
function pad(n)    { return String(n).padStart(2, '0'); }
function fmtDate(d) { return d ? d.replace(/-/g, '.') : '—'; }
function fmtTs(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function nl2br(s) { return s.replace(/\n/g, '<br>'); }

// ── Init ──
load();
render();
</script>
</body>
</html>
